# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: gqls
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# ─── Homebrew Tap ─────────────────────────────────────────────────────────────
brews:
  - name: gqls

    # The tap repo: github.com/omkoli/homebrew-gqls
    repository:
      owner: omkoli
      name: homebrew-gqls
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

    # Metadata written into the Formula
    homepage: "https://github.com/omkoli/GQLS-CLI"
    description: "GraphQL vulnerability scanner — find security issues in your GraphQL APIs"
    license: "MIT"  # change to match your actual license

    # Where in the tap repo to write the formula
    directory: Formula

    # Commit message when GoReleaser pushes the formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update gqls formula to {{ .Tag }}"

    # Optional: shell completion / post-install message
    # install: |
    #   bin.install "gqls"

    test: |
      system "#{bin}/gqls", "--version"